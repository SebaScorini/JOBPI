<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="JOBPI helps you analyze CVs, evaluate job posts, track applications, and match your profile to roles so you can apply faster and make smarter career moves."
    />
    <meta name="keywords" content="JOBPI, CV analysis, job tracker, resume matcher, job applications" />
    <meta name="author" content="JOBPI" />
    <meta name="theme-color" content="#0B1220" />

    <meta property="og:title" content="JOBPI | AI Career Assistant" />
    <meta
      property="og:description"
      content="Analyze CVs, compare job posts, and track applications in one place with JOBPI to make faster, smarter job decisions."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="" />
    <meta property="og:image" content="" />
    <meta property="og:site_name" content="JOBPI" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="JOBPI | AI Career Assistant" />
    <meta
      name="twitter:description"
      content="Analyze CVs, compare job posts, and track applications in one place with JOBPI to make faster, smarter job decisions."
    />
    <meta name="twitter:image" content="" />

    <title>Home | JOBPI</title>

    <script id="jobpi-schema" type="application/ld+json"></script>
    <script>
      (function () {
        var themeStorageKey = 'jobpi_theme_mode';
        var storedThemeMode = localStorage.getItem(themeStorageKey);
        var systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var resolvedTheme =
          storedThemeMode === 'light' || storedThemeMode === 'dark'
            ? storedThemeMode
            : systemPrefersDark
              ? 'dark'
              : 'light';
        document.documentElement.classList.toggle('dark', resolvedTheme === 'dark');

        var origin = window.location.origin.replace(/\/$/, '');
        var homeUrl = origin + '/';
        var imageUrl = origin + '/favicon.svg';

        function upsertMeta(attribute, key, value) {
          var selector = 'meta[' + attribute + '="' + key + '"]';
          var tag = document.querySelector(selector);
          if (!tag) {
            tag = document.createElement('meta');
            tag.setAttribute(attribute, key);
            document.head.appendChild(tag);
          }
          tag.setAttribute('content', value);
        }

        var canonical = document.querySelector('link[rel="canonical"]');
        if (!canonical) {
          canonical = document.createElement('link');
          canonical.setAttribute('rel', 'canonical');
          document.head.appendChild(canonical);
        }
        canonical.setAttribute('href', homeUrl);

        upsertMeta('property', 'og:url', homeUrl);
        upsertMeta('property', 'og:image', imageUrl);
        upsertMeta('name', 'twitter:image', imageUrl);

        var schema = document.getElementById('jobpi-schema');
        if (schema) {
          schema.textContent = JSON.stringify({
            '@context': 'https://schema.org',
            '@type': 'SoftwareApplication',
            name: 'JOBPI',
            applicationCategory: 'BusinessApplication',
            operatingSystem: 'Web',
            url: homeUrl,
            description:
              'JOBPI helps you analyze CVs, evaluate job posts, track applications, and match your profile to roles so you can apply faster and make smarter career moves.',
            image: imageUrl,
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
